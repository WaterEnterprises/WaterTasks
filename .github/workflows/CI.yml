name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------
  # ANDROID — Play Store (AAB + APKs)
  # Requires: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
  # ---------------------------------------------------
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Decode Keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create key.properties
        run: |
          if [ -f upload-keystore.jks ]; then
            echo "storeFile=upload-keystore.jks" > key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          fi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Rename AAB
        run: mv build/app/outputs/bundle/release/app-release.aab app-Android.aab

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Rename Universal APK
        run: mv build/app/outputs/flutter-apk/app-release.apk app-Android-Universal.apk

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename Split APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk app-Android-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk app-Android-armv7.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk app-Android-x86.apk

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Android-Builds
          path: app-Android*

  # ---------------------------------------------------
  # iOS — App Store (IPA, unsigned fallback)
  # Requires: P12_BASE64, P12_PASSWORD, PROVISIONING_PROFILE_BASE64, KEYCHAIN_PASSWORD
  # ---------------------------------------------------
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Install Signing Certificate & Provisioning Profile
        run: |
          if [ -n "$P12_BASE64" ]; then
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            echo "$P12_BASE64" | base64 -d > certificate.p12
            security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          fi
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build IPA
        run: |
          if [ -n "$P12_BASE64" ]; then
            flutter build ipa --release --export-options-plist=ios/Runner/ExportOptions.plist
          else
            flutter build ios --release --no-codesign
          fi
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}

      - name: Rename / Compress IPA
        run: |
          if [ -n "$P12_BASE64" ]; then
            mv build/ios/ipa/*.ipa app-iOS.ipa
          else
            zip -r app-iOS-unsigned.zip build/ios
          fi
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}

      - name: Cleanup Keychain
        if: ${{ always() }}
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f certificate.p12 profile.mobileprovision

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: iOS-Builds
          if-no-files-found: ignore
          path: |
            app-iOS.ipa
            app-iOS-unsigned.zip

  # ---------------------------------------------------
  # macOS — Desktop (.app.zip)
  # ---------------------------------------------------
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package .app as ZIP
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../app-macOS.zip Water\ Tasks.app

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macOS-Build
          path: app-macOS.zip

  # ---------------------------------------------------
  # LINUX — Desktop x64 (AppImage)
  # ---------------------------------------------------
  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev file

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Extract appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract > /dev/null 2>&1
          mv squashfs-root appimagetool

      - name: Build AppImage
        run: |
          APP=WaterTasks
          ARCH=x86_64
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')

          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/water_tasks" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/$APP.desktop << EOF
          [Desktop Entry]
          Name=$APP
          Comment=Gamified task management
          Exec=water_tasks
          Icon=$APP
          Type=Application
          Categories=Utility;
          EOF

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          convert -size 256x256 xc:'#2196F3' -fill white -gravity center \
            -pointsize 100 -annotate +0+0 'WT' \
            AppDir/usr/share/icons/hicolor/256x256/apps/$APP.png 2>/dev/null || \
          python3 -c "
          import struct, zlib
          def png(w,h,rgb):
            raw = b''
            for y in range(h):
              raw += b'\x00' + bytes(rgb) * w
            def chunk(t,d):
              c = struct.pack('>I',len(d)) + t + d
              return c + struct.pack('>I',zlib.crc32(c) & 0xffffffff)
            ihdr = struct.pack('>IIBBBBB',w,h,8,2,0,0,0)
            return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR',ihdr) + chunk(b'IDAT',zlib.compress(raw)) + chunk(b'IEND',b'')
          with open('AppDir/usr/share/icons/hicolor/256x256/apps/$APP.png','wb') as f:
            f.write(png(256,256,(33,150,243)))
          "
          ln -sf ../usr/share/icons/hicolor/256x256/apps/$APP.png AppDir/$APP.png

          ./appimagetool/AppRun AppDir WaterTasks-$ARCH-$VERSION.AppImage

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Linux-Build-x64
          path: WaterTasks-*.AppImage

  # ---------------------------------------------------
  # LINUX — Desktop arm64 (AppImage)
  # ---------------------------------------------------
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev file

      - name: Build Linux arm64
        run: flutter build linux --release

      - name: Extract appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage
          chmod +x appimagetool-aarch64.AppImage
          ./appimagetool-aarch64.AppImage --appimage-extract > /dev/null 2>&1
          mv squashfs-root appimagetool

      - name: Build AppImage
        run: |
          APP=WaterTasks
          ARCH=aarch64
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')

          mkdir -p AppDir/usr/bin
          cp -r build/linux/arm64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/water_tasks" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/$APP.desktop << EOF
          [Desktop Entry]
          Name=$APP
          Comment=Gamified task management
          Exec=water_tasks
          Icon=$APP
          Type=Application
          Categories=Utility;
          EOF

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          python3 -c "
          import struct, zlib
          def png(w,h,rgb):
            raw = b''
            for y in range(h):
              raw += b'\x00' + bytes(rgb) * w
            def chunk(t,d):
              c = struct.pack('>I',len(d)) + t + d
              return c + struct.pack('>I',zlib.crc32(c) & 0xffffffff)
            ihdr = struct.pack('>IIBBBBB',w,h,8,2,0,0,0)
            return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR',ihdr) + chunk(b'IDAT',zlib.compress(raw)) + chunk(b'IEND',b'')
          with open('AppDir/usr/share/icons/hicolor/256x256/apps/$APP.png','wb') as f:
            f.write(png(256,256,(33,150,243)))
          "
          ln -sf ../usr/share/icons/hicolor/256x256/apps/$APP.png AppDir/$APP.png

          ./appimagetool/AppRun AppDir WaterTasks-$ARCH-$VERSION.AppImage

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Linux-Build-arm64
          path: WaterTasks-*.AppImage

  # ---------------------------------------------------
  # WINDOWS — Desktop x64 (Inno Setup .exe)
  # ---------------------------------------------------
  build-windows-x64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version: ').Line -replace '^version: ', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyBuildDir="$pwd\build\windows\x64\runner\Release" `
            /DMyArch="x64" `
            /DMyAppVersion="$version" `
            /DMyOutputDir="$pwd" `
            windows\installer\setup.iss

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Windows-Build-x64
          path: WaterTasks-*-Setup.exe

  # ---------------------------------------------------
  # WINDOWS — Desktop arm64 (Inno Setup .exe)
  # ---------------------------------------------------
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build Windows arm64
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version: ').Line -replace '^version: ', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyBuildDir="$pwd\build\windows\arm64\runner\Release" `
            /DMyArch="arm64" `
            /DMyAppVersion="$version" `
            /DMyOutputDir="$pwd" `
            windows\installer\setup.iss

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Windows-Build-arm64
          path: WaterTasks-*-Setup.exe

  # ---------------------------------------------------
  # WEB (zip)
  # ---------------------------------------------------
  build-web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Compress Web Build
        run: |
          cd build/web && zip -r ../../app-Web.zip .

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Web-Build
          path: app-Web.zip

  # ---------------------------------------------------
  # AUTOMATIC RELEASE
  # ---------------------------------------------------
  create-release:
    needs:
      - build-android
      - build-ios
      - build-macos
      - build-linux-x64
      - build-linux-arm64
      - build-windows-x64
      - build-windows-arm64
      - build-web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Get Version from Pubspec
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
            echo "No version set in pubspec.yaml, defaulting to $VERSION"
          fi
          echo "Detected Version: $VERSION"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: all_artifacts

      - name: Move artifacts to root
        run: |
          find all_artifacts -type f \( -name '*.apk' -o -name '*.aab' -o -name '*.ipa' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' \) -exec mv {} . \;

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Release v${{ env.APP_VERSION }}
          files: |
            *.apk
            *.aab
            *.ipa
            *.zip
            *.exe
            *.AppImage
          draft: false
          prerelease: false
