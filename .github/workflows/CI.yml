name: Build & Release Calling

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------
  # 0. TESTS
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - name: Run tests
        run: flutter test test/parser_test.dart

  # ---------------------------------------------------
  # 1. ANDROID BUILD (Universal + Splits)
  # ---------------------------------------------------
  build-android:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Rename Universal APK
        run: mv build/app/outputs/flutter-apk/app-release.apk Calling-Universal.apk

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename Split APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Calling-Android-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk Calling-Android-armv7.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk Calling-Android-x86.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Calling-Android-All
          path: Calling-*.apk

  # ---------------------------------------------------
  # 2. IOS BUILD
  # ---------------------------------------------------
  build-ios:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Compress Build
        run: zip -r Calling-iOS.zip build/ios

      - uses: actions/upload-artifact@v4
        with:
          name: Calling-iOS
          path: Calling-iOS.zip

  # ---------------------------------------------------
  # 3. AUTOMATIC RELEASE
  # ---------------------------------------------------
  create-release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Version from Pubspec
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "Detected Version: $VERSION"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Move artifacts to root
        run: |
          mv all_artifacts/Calling-Android-All/*.apk .
          mv all_artifacts/Calling-iOS/*.zip .

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Release v${{ env.APP_VERSION }}
          files: |
            *.apk
            *.zip
          draft: false
          prerelease: false
