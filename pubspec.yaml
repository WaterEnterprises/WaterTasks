name: water_tasks
description: "A gamified task management app that helps you stay focused and build productivity streaks."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.0
  intl: ^0.20.3
  fl_chart: ^1.2.0
  audioplayers: ^6.1.0
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  window_manager: ^0.4.3
  system_tray: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4+4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
